# Bagel's Party (Flutter) — Codemagic iOS → TestFlight (Apple Developer required).
#
# Repository: commit `codemagic.yaml` at the Flutter project root, then add this repo in Codemagic
# and select workflow "iOS Release (TestFlight)".
#
# One-time setup:
# 1. App Store Connect: app record with bundle ID com.pawparty.pawParty (matches Xcode + Firebase).
# 2. App Store Connect → Users and Access → Integrations → App Store Connect API → key with App Manager. Download .p8 once.
# 3. Codemagic → Teams → Personal Account → Integrations → Developer Portal / App Store Connect → add the API key.
# 4. Set `integrations.app_store_connect` below to that integration’s exact name (replace `codemagic` if different).
# 5. Codemagic → bagels-party → Environment variables: add variable APP_STORE_APPLE_ID (Apple ID number)
#    and assign it to group `app_store` (create the group by typing that name in "Search for group...").
#    The workflow below loads that group via `environment.groups`.
# 6. Signing: Codemagic → Teams → Code signing identities → iOS, or let the workflow fetch profiles via the same API key
#    (see https://docs.codemagic.io/yaml-code-signing/signing-ios/ ).
#
# Versioning: `flutter build ipa` uses `version:` from pubspec.yaml (part before +) as CFBundleShortVersionString;
# iOS build number (CFBundleVersion) = latest App Store Connect build + 1 (or 1 if none yet).
#
# TestFlight: Internal testing — add testers under Users and Access, then TestFlight → Internal Testing → enable the build.
# External testing requires Beta App Review for the first build.

workflows:
  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - app_store
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.pawparty.pawParty
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: '*'
          include: true
          source: true
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: cd ios && pod install
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Flutter build ipa
        script: |
          set -e
          VERSION=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version: //;s/ *#.*//' | cut -d'+' -f1 | tr -d ' ')
          EXPORT_PLIST=/Users/builder/export_options.plist
          if [ ! -f "$EXPORT_PLIST" ]; then EXPORT_PLIST="$HOME/export_options.plist"; fi
          if [ ! -f "$EXPORT_PLIST" ]; then echo "export_options.plist missing; run xcode-project use-profiles first."; exit 1; fi
          LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null) || true
          LATEST=${LATEST:-0}
          BUILD_NUMBER=$((LATEST + 1))
          flutter build ipa --release \
            --build-name="$VERSION" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist="$EXPORT_PLIST"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
        # Uncomment; names must match App Store Connect → TestFlight → groups exactly:
        # beta_groups:
        #   - Internal testers
