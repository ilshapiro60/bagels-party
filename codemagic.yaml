# ZumiTok (Flutter) — Codemagic
#
# Put this file at the repository root (same folder as `pubspec.yaml`), connect the repo
# in Codemagic, then enable the workflows you want.
#
# ── pull-request-checks (Linux) ─────────────────────────────────────────────
# No Apple or Play credentials. Runs on pull requests (and optional push; see triggering).
# Codemagic: create an app from this repo → Codemagic picks up `codemagic.yaml` workflows.
#
# ── iOS Release (TestFlight) ────────────────────────────────────────────────
# Apple Developer + App Store Connect API key required.
#
# One-time setup (iOS):
# 1. App Store Connect: app record with bundle ID com.pawparty.pawParty (matches Xcode + Firebase).
# 2. App Store Connect → Users and Access → Integrations → App Store Connect API → key with App Manager. Download .p8 once.
# 3. Codemagic → Integrations → Developer Portal / App Store Connect → add the API key.
# 4. Set `integrations.app_store_connect` on workflow `ios-release` to that integration’s exact name (replace `codemagic` if different).
# 5. Codemagic → your application → Environment variables → group `app_store` (all required):
#    - APP_STORE_APPLE_ID = numeric Apple ID (App Store Connect → app → General → Apple ID).
#      Needed for get-latest-app-store-build-number; without it, build numbers fall back to pubspec +N only.
#    - APP_STORE_CONNECT_ISSUER_ID = Issuer ID (Users and Access → Integrations → App Store Connect API).
#    - APP_STORE_CONNECT_KEY_IDENTIFIER = Key ID for the API key (e.g. Z5Z3VMM7Y5).
#    - APP_STORE_CONNECT_PRIVATE_KEY = full contents of the AuthKey_xxx.p8 file (Secret), including
#      -----BEGIN PRIVATE KEY----- / END lines. Fixes 401 publishing if UI “integration” auth fails.
# 6. Signing: Codemagic → Code signing identities → iOS, or use automatic signing via the same API key
#    (see https://docs.codemagic.io/yaml-code-signing/signing-ios/ ).
# 7. Places (vet map picker): native Places SDK — same API key as Maps (GMSApiKey in Info.plist).
#    Enable Places API (New) on that key in Google Cloud.
#
# Versioning (iOS): `flutter build ipa` uses `version:` from pubspec.yaml (part before +) as CFBundleShortVersionString;
# iOS build number (CFBundleVersion) = latest App Store Connect build + 1 (or pubspec +N floor).
#
# TestFlight: Internal testing — add testers under Users and Access, then TestFlight → Internal Testing → enable the build.
# External testing requires Beta App Review for the first build.

workflows:
  pull-request-checks:
    name: PR checks (analyze, test, Android APK)
    max_build_duration: 45
    instance_type: linux_x2
    environment:
      flutter: stable
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches
    triggering:
      cancel_previous_builds: true
      events:
        - pull_request
      branch_patterns:
        - pattern: '*'
          include: true
          source: true
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Flutter analyze
        script: flutter analyze
      - name: Flutter test
        script: flutter test
      - name: Android release APK (compile smoke; debug signing from app/build.gradle.kts)
        script: flutter build apk --release

  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - app_store
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.pawparty.pawParty
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/Library/Caches/CocoaPods
    triggering:
      cancel_previous_builds: true
      events:
        - push
        - tag
      branch_patterns:
        - pattern: '*'
          include: true
          source: true
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Flutter analyze
        script: flutter analyze
      - name: Flutter test
        script: flutter test
      - name: Install CocoaPods dependencies
        script: cd ios && pod install
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Flutter build ipa
        script: |
          set -e
          VERSION=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version: //;s/ *#.*//' | cut -d'+' -f1 | tr -d ' ')
          PUBSPEC_LINE=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version: //;s/ *#.*//' | tr -d ' ')
          PUBSPEC_BUILD=$(echo "$PUBSPEC_LINE" | cut -d'+' -f2)
          PUBSPEC_BUILD=${PUBSPEC_BUILD:-1}
          EXPORT_PLIST=/Users/builder/export_options.plist
          if [ ! -f "$EXPORT_PLIST" ]; then EXPORT_PLIST="$HOME/export_options.plist"; fi
          if [ ! -f "$EXPORT_PLIST" ]; then echo "export_options.plist missing; run xcode-project use-profiles first."; exit 1; fi
          # CFBundleVersion must be strictly greater than the last uploaded build (TestFlight/App Store).
          if ! LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null); then
            LATEST=0
            echo "WARN: get-latest-app-store-build-number failed (check APP_STORE_APPLE_ID + API key). Falling back to pubspec +N only — bump +N in pubspec.yaml if upload says duplicate."
          fi
          LATEST=$(echo "$LATEST" | tr -d '[:space:]')
          case "$LATEST" in ''|*[!0-9]*) LATEST=0 ;; esac
          BUILD_NUMBER=$((LATEST + 1))
          # Floor: never below pubspec +N (manual bump each release when ASC API is wrong or flaky).
          if [ "$BUILD_NUMBER" -lt "$PUBSPEC_BUILD" ]; then BUILD_NUMBER=$PUBSPEC_BUILD; fi
          echo "flutter build ipa: build-name=$VERSION build-number=$BUILD_NUMBER (ASC latest=$LATEST, pubspec +$PUBSPEC_BUILD)"
          flutter build ipa --release \
            --build-name="$VERSION" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist="$EXPORT_PLIST"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        # Use env vars (same group `app_store`) so upload JWT matches your .p8; avoids 401 if UI key storage drifts.
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
        # Uncomment; names must match App Store Connect → TestFlight → groups exactly:
        # beta_groups:
        #   - Internal testers
